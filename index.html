<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="1;url=https://song-story-corpus.github.io/assc-zola/">
  <title>Redirecting...</title>
  <script>
    var target = "https://song-story-corpus.github.io/assc-zola";
    window.location.replace(target + window.location.pathname + window.location.search + window.location.hash);
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #ddd;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.9rem;
      color: #888;
    }

    a {
      color: #555;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    a:hover { color: #111; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Redirecting...</h1>
    <p>If nothing happens, <a href="https://song-story-corpus.github.io/assc-zola/">click here</a>.</p>
  </div>
</body>
</html>
